<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Cult Podcasts</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f4f0e8" data-dark="#0b0d12">
  <meta name="supported-color-schemes" content="dark light">
  <meta name="color-scheme" content="dark light">

  <script type="text/javascript">
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      const themeColor = document.querySelector("meta[name=theme-color]");
      const darkThemeColor = themeColor.attributes["data-dark"].value;
      themeColor.attributes["content"].value = darkThemeColor;
    }
  </script>
</head>

<body class="mat-typography mat-app-background">
  <app-root></app-root>
</body>

</html>
