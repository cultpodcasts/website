@defer {
@if (isEpisode()) {
  @if (episode(); as ep) {
  <app-podcast-episode [episode]="ep" [parentLoaded]="true"></app-podcast-episode>
  } @else if (isLoading()) {
  <app-site-loading [active]="true" label="Loading episode" />
  } @else {
  <section class="browse-empty">
    <h2>Episode not found.</h2>
    <div id="cta-button">
      <a mat-flat-button color="primary" [routerLink]="['/podcast', podcastName]">Try the Podcast's page!</a>
    </div>
  </section>
  }
} @else {
  <app-podcast-api></app-podcast-api>
}
}
